<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เครื่องมือคำนวณยา (แยกส่วน)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .section-title{font-weight:bold;margin-top:1rem}
    .days label{margin-right:10px}
  </style>
</head>
<body class="bg-light">

<div class="container my-4">

<div class="card shadow mb-4" id="printArea1">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">1) คำนวณวันครบการให้ยา</h5>
  </div>
  <div class="card-body">

    <label class="form-label">วันและเวลาเริ่มให้ยา</label>
    <input type="datetime-local" id="startDate" class="form-control mb-3">

    <label class="form-label">รูปแบบการคำนวณ</label><br>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" name="mode" value="day" checked>
      <label class="form-check-label">ตามจำนวนวัน</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" name="mode" value="dose">
      <label class="form-check-label">ตามจำนวนครั้ง</label>
    </div>

    <div class="row mt-3">
      <div class="col-md-6">
        <label class="form-label">จำนวนวัน / จำนวนครั้ง</label>
        <input type="number" id="count" class="form-control" value="7">
      </div>
      <div class="col-md-6">
        <label class="form-label">ความถี่ (ชั่วโมง)</label>
        <input type="number" id="interval" class="form-control" value="24">
      </div>
    </div>

    <button class="btn btn-success w-100 mt-3" onclick="calcEndDate()">คำนวณ</button>
    
    <div id="result1" class="alert alert-info mt-3 d-none"></div>

    <button class="btn btn-outline-danger w-100 mt-2" onclick="exportCurrent(this,'สรุปวันครบการให้ยา.pdf')">พิมพ์ / Export PDF</button>

  </div>
</div>

<div class="card shadow mb-4" id="printArea2">
  <div class="card-header bg-success text-white">
    <h5 class="mb-0">2) คำนวณจำนวนวัน และจำนวนยา</h5>
  </div>
  <div class="card-body">

    <label class="form-label">วันที่เริ่มต้น</label>
    <input type="date" id="startPicker" class="form-control mb-2">

    <label class="form-label">วันที่สิ้นสุด</label>
    <input type="date" id="endPicker" class="form-control mb-2">

    <label class="form-label">จำนวนเม็ดต่อสัปดาห์</label>
    <input type="number" id="pillsPerWeek" class="form-control mb-2" placeholder="กรอกจำนวนเม็ดต่อสัปดาห์">

    <label class="form-label">วันหยุดยา</label><br>
    <div class="days mb-2">
      <label><input type="checkbox" value="0"> อาทิตย์</label>
      <label><input type="checkbox" value="1"> จันทร์</label>
      <label><input type="checkbox" value="2"> อังคาร</label>
      <label><input type="checkbox" value="3"> พุธ</label>
      <label><input type="checkbox" value="4"> พฤหัสบดี</label>
      <label><input type="checkbox" value="5"> ศุกร์</label>
      <label><input type="checkbox" value="6"> เสาร์</label>
    </div>

    <button class="btn btn-success w-100 mt-3" onclick="calcPills()">คำนวณ</button>

    <div id="result2" class="alert alert-info mt-3 d-none"></div>

    <button class="btn btn-outline-danger w-100 mt-2" onclick="exportCurrent(this,'สรุปจำนวนยา.pdf')">พิมพ์ / Export PDF</button>

  </div>
</div>

<div class="card shadow mb-4" id="printArea3">
  <div class="card-header bg-warning">
    <h5 class="mb-0">3) คำนวณจำนวนยาที่ต้องให้</h5>
  </div>
  <div class="card-body">

    <label class="form-label">วันและเวลาเริ่มให้ยา</label>
    <input type="datetime-local" id="doseStart" class="form-control mb-2">

    <label class="form-label">วันและเวลามื้อสุดท้าย</label>
    <input type="datetime-local" id="doseEnd" class="form-control mb-2">

    <label class="form-label">จำนวนยาต่อครั้ง</label>
    <input type="number" step="0.01" id="doseEach" class="form-control mb-2">

    <label class="form-label">ความถี่ในการให้ยา (ชั่วโมง)</label>
    <input type="number" id="doseInterval" class="form-control mb-2" value="24">

    <button class="btn btn-success w-100 mt-2" onclick="calcTotalDose()">คำนวณจำนวนยา</button>

    <div id="doseResult" class="alert alert-info mt-3 d-none"></div>

    <button class="btn btn-outline-danger w-100 mt-2" onclick="exportCurrent(this,'คำนวณจำนวนยา.pdf')">พิมพ์ / Export PDF</button>

  </div>
</div> 

<div class="card shadow mb-4" id="printArea4">
  <div class="card-header bg-info text-white">
    <h5 class="mb-0">4) คำนวณวันเวลาสิ้นสุดการให้ยา</h5>
  </div>
  <div class="card-body">

    <label class="form-label">วันและเวลาเริ่มยา</label>
    <input type="datetime-local" id="endCalcStart" class="form-control mb-2">

    <label class="form-label">ความถี่ในการให้ยา (ชั่วโมง)</label>
    <input type="number" id="endCalcInterval" class="form-control mb-2" value="24">

    <label class="form-label">รูปแบบการคำนวณ</label>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="endMode" value="days" checked>
      <label class="form-check-label">จำนวนวัน</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="endMode" value="doses">
      <label class="form-check-label">จำนวนครั้ง</label>
    </div>

    <label class="form-label mt-2">จำนวนวัน / จำนวนครั้ง</label>
    <input type="number" id="endCalcCount" class="form-control" value="7">

    <button class="btn btn-success w-100 mt-3" onclick="calcFinishDate()">คำนวณ</button>

    <div id="finishResult" class="alert alert-info mt-3 d-none"></div>

    <button class="btn btn-outline-danger w-100 mt-2" onclick="exportCurrent(this,'วันสิ้นสุดการให้ยา.pdf')">พิมพ์ / Export PDF</button>

  </div>
</div> 

</div>

<script>
// ===== ส่วนที่ 1 =====
function calcEndDate(){
  const start = new Date(startDate.value);
  const count = +countInput.value;
  const interval = +intervalInput.value;
  const mode = document.querySelector('input[name="mode"]:checked').value;
  if(isNaN(start) || !count || !interval) return;

  let end;

  if(mode === 'day'){
    const dosesPerDay = 24 / interval;
    const totalDoses = count * dosesPerDay;
    end = new Date(start.getTime() + (totalDoses - 1) * interval * 3600000);
  }else{
    end = new Date(start.getTime() + (count - 1) * interval * 3600000);
  }

  result1.classList.remove('d-none');
  result1.innerHTML = `<strong>วันและเวลาที่ให้ยาครั้งสุดท้าย</strong><br>${end.toLocaleString('th-TH')}`;
}

const countInput=document.getElementById('count');
const intervalInput=document.getElementById('interval');

// ===== ส่วนที่ 2 =====
function getSkipDays(){return Array.from(document.querySelectorAll('.days input:checked')).map(c=>+c.value);} 
function calcPills(){
  if(!pillsPerWeek.value)return;
  const s=new Date(startPicker.value);
  const e=new Date(endPicker.value);
  if(isNaN(s)||isNaN(e)||e<s)return;
  let total=0,take=0;
  const skip=getSkipDays();
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    total++; if(!skip.includes(d.getDay()))take++;
  }
  const ppd=pillsPerWeek.value/(7-skip.length);

  // เปลี่ยนการแสดงผลส่วนที่ 2 ให้เป็นรูปแบบกล่อง Alert สีฟ้า
  const result2 = document.getElementById('result2');
  result2.classList.remove('d-none');
  result2.innerHTML = `
    <strong>จำนวนวันทั้งหมด</strong> : ${total} วัน<br>
    <strong>จำนวนสัปดาห์</strong> : ${(total/7).toFixed(2)} สัปดาห์<br>
    <strong>วันที่ต้องกินยา (หักวันหยุด)</strong> : ${take} วัน<br>
    <strong>ปริมาณยาเฉลี่ย</strong> : ${ppd.toFixed(2)} เม็ด/วัน<br>
    <strong>จำนวนเม็ดยารวมที่ต้องใช้</strong> : <span class="text-danger font-weight-bold">${Math.ceil(take*ppd)}</span> เม็ด
  `;
}

const today=new Date().toISOString().split('T')[0];
startPicker.value=today; endPicker.value=today;
[startPicker,endPicker,pillsPerWeek].forEach(e=>e.onchange=calcPills);
document.querySelectorAll('.days input').forEach(c=>c.onchange=calcPills);

// ===== ส่วนที่ 3 =====
function calcTotalDose(){
  const start = new Date(document.getElementById('doseStart').value);
  const end = new Date(document.getElementById('doseEnd').value);
  const doseEach = parseFloat(document.getElementById('doseEach').value);
  const interval = parseFloat(document.getElementById('doseInterval').value);
  const doseResult = document.getElementById('doseResult');

  if(isNaN(start) || isNaN(end) || !doseEach || !interval){
    return;
  }

  if(end < start){
    alert("วันสุดท้ายต้องมากกว่าวันเริ่ม");
    return;
  }

  const diffHour = (end.getTime() - start.getTime()) / 3600000;
  const totalTimes = Math.floor(diffHour / interval) + 1;
  const totalDose = totalTimes * doseEach;

  doseResult.classList.remove('d-none');
  doseResult.innerHTML = `
    <strong>จำนวนครั้งที่ให้ยา</strong> : ${totalTimes.toLocaleString()} ครั้ง<br>
    <strong>จำนวนยาต่อครั้ง</strong> : ${doseEach} หน่วย<br>
    <strong>จำนวนยารวมที่ต้องใช้</strong> : ${totalDose.toLocaleString()} หน่วย
  `;
}

// ===== ส่วนที่ 4 =====
function calcFinishDate(){
  const start = new Date(document.getElementById('endCalcStart').value);
  const interval = parseFloat(document.getElementById('endCalcInterval').value);
  const count = parseFloat(document.getElementById('endCalcCount').value);
  const mode = document.querySelector('input[name="endMode"]:checked').value;
  const finishResult = document.getElementById('finishResult');

  if(isNaN(start) || !interval || !count){
    return;
  }

  let finishDate;

  if(mode === 'days'){
    const dosesPerDay = 24 / interval;
    const totalDoseCount = count * dosesPerDay;
    finishDate = new Date(start.getTime() + ((totalDoseCount - 1) * interval * 3600000));
  }else{
    finishDate = new Date(start.getTime() + ((count - 1) * interval * 3600000));
  }

  finishResult.classList.remove('d-none');
  finishResult.innerHTML = `
    <strong>วันและเวลาที่ให้ยาครั้งสุดท้าย</strong><br>
    ${finishDate.toLocaleString('th-TH')}
  `;
}

// ===== export PDF ===== 
function exportCurrent(btn,filename){
  const card = btn.closest('.card');
  html2pdf().from(card).set({
    margin:10,
    filename:filename,
    html2canvas:{scale:2},
    jsPDF:{orientation:'portrait',unit:'mm',format:'a4'}
  }).save();
}
</script>

</body>
</html>
